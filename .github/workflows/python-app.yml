name: Python CI

on:
  push:
    branches: 
        - main
  pull_request:
    branches: 
        - main

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            # 1. This block pulls your code into the runner
            - name: Checkout code
              uses: actions/checkout@v2

            # 2. This block sets up Python and installs dependencies
            - name: Set up Python 3.8
              uses: actions/setup-python@v2
              with:
                python-version: 3.8

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            # 3. This block runs your tests
            - name: Run tests
              run: |
                pytest 
